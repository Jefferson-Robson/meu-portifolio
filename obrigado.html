<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado! • Jefferson Robson</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; }
        .hero-bg { background: linear-gradient(135deg, #0f172a 0%, #020617 100%); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-950/80 backdrop-blur-lg border-b border-slate-800">
        <div class="max-w-4xl mx-auto px-6 h-20 flex items-center">
            <a href="/" class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-robot text-white text-xl"></i>
                </div>
                <div class="font-display font-semibold text-xl tracking-tighter">Jefferson Robson</div>
            </a>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center px-6">
        <div class="text-center max-w-lg">
            <div class="w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-8">
                <i class="fa-solid fa-check text-emerald-400 text-4xl"></i>
            </div>
            <h1 class="font-display text-4xl font-semibold tracking-tighter mb-4">Mensagem enviada!</h1>
            <p class="text-slate-400 text-lg leading-relaxed mb-8">
                Obrigado pelo contato. Recebi sua mensagem e responderei em até <strong>24 horas</strong>.
            </p>
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="/" class="inline-flex items-center justify-center px-8 py-4 bg-emerald-500 text-white font-medium rounded-3xl text-lg whitespace-nowrap hover:bg-emerald-600 transition-colors">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Voltar ao início
                </a>
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-800 py-10 text-center">
        <p class="text-xs text-slate-500">© 2026 Jefferson Robson</p>
    </footer>

    <!-- Meta Pixel -->
    <script>
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.agent='plhermes';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');

        var consent = localStorage.getItem('cookie_consent_tracking');
        if (consent === 'accepted') {
            fbq('init', '2367822273743469');
            fbq('track', 'Lead');
        }
    </script>
    <noscript>
        <img height="1" width="1" style="display:none"
             src="https://www.facebook.com/tr?id=2367822273743469&ev=Lead&noscript=1"/>
    </noscript>

    <!-- Google Ads Conversion -->
    <script>
        (function() {
            var consent = localStorage.getItem('cookie_consent_tracking');
            if (consent === 'accepted') {
                window.dataLayer = window.dataLayer || [];
                window.dataLayer.push({
                    'event': 'conversion',
                    'conversion_id': 'YOUR_GOOGLE_CONVERSION_ID/YOUR_CONVERSION_LABEL'
                });
            }
        })();
    </script>
</body>
</html>
